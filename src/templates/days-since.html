<section id="daysSinceView" class="card hidden">
  <div class="row">
    <button id="backHomeFromDaysBtn" class="secondary">← Retour accueil</button>
  </div>
  <h2>Sous-app: Jours depuis une date</h2>
  <p class="muted">Choisis une date de départ :</p>
  <input id="sinceDate" type="date" />
  <div class="row">
    <button id="saveDateBtn">Sauver la date</button>
    <button id="calcDaysBtn" class="secondary">Recalculer</button>
  </div>
  <p id="daysResult" class="result">0 jour</p>
</section>
