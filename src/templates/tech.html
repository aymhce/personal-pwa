<section id="techView" class="card hidden">
  <div class="row">
    <button id="backHomeFromTechBtn" class="secondary">← Retour accueil</button>
  </div>

  <h2>Configuration OAuth Google</h2>
  <p class="muted">
    Renseigne ton Client ID OAuth Web (Google Cloud Console).
  </p>
  <input
    id="clientId"
    placeholder="Google OAuth Client ID"
    value="559299748168-de1oiaaomtetkua9gh2iktv7c7f04ug3.apps.googleusercontent.com"
  />
  <div class="row">
    <button id="saveConfig" class="secondary">Sauver config locale</button>
    <button id="loginBtn">Se connecter à Google</button>
  </div>
  <button id="logoutBtn" class="secondary">Se déconnecter</button>
  <p class="muted">Scope utilisé: <code>https://www.googleapis.com/auth/drive.appdata</code></p>

  <h2>Données quotidiennes</h2>
  <p class="muted">Stockage dans un fichier JSON sur Google Drive (appDataFolder).</p>
  <input id="title" placeholder="Titre / clé (ex: journal-2026-07-04)" />
  <textarea id="content" placeholder="Ton contenu..."></textarea>
  <div class="row">
    <button id="saveBtn">Sauvegarder sur Drive</button>
    <button id="loadBtn" class="secondary">Charger depuis Drive</button>
  </div>

  <h2>Logs</h2>
  <pre id="log" class="muted"></pre>
</section>
