<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ma PWA Drive</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }
      .app {
        max-width: 860px;
        margin: 0 auto;
        min-height: 100dvh;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .card {
        background: #111827;
        border: 1px solid #1f2937;
        border-radius: 12px;
        padding: 12px;
      }
      input, textarea, button {
        width: 100%;
        box-sizing: border-box;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
        padding: 10px 12px;
        font-size: 16px;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      button {
        cursor: pointer;
        background: #1d4ed8;
        border: none;
        font-weight: 600;
      }
      button.secondary { background: #334155; }
      .row { display: flex; gap: 10px; }
      .muted { color: #94a3b8; font-size: 14px; }
      code { font-size: 12px; word-break: break-all; }
      .hidden { display: none !important; }
      .tiles {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 10px;
      }
      .tile {
        border: 1px solid #334155;
        background: #0b1220;
        border-radius: 12px;
        padding: 12px;
        text-align: left;
      }
      .tile h3 {
        margin: 0 0 8px 0;
        font-size: 18px;
      }
      .result {
        font-size: 24px;
        font-weight: 700;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Ma PWA Drive</h1>
      <div id="app-root">
        <section id="homeView" class="card">
          <h2>Accueil</h2>
          <p class="muted">Choisis une tuile :</p>
          <div class="tiles">
            <button id="openDaysSinceBtn" class="tile">
              <h3>App Dates</h3>
              <p class="muted">Stocke une date modifiable et calcule les jours passés.</p>
            </button>
            <button id="openTechBtn" class="tile secondary">
              <h3>Tuile Technique</h3>
              <p class="muted">Connexion Google, configuration OAuth et logs.</p>
            </button>
          </div>
        </section>

        <section id="daysSinceView" class="card hidden">
          <h2>App Dates</h2>
          <p class="muted">Enregistre une date et calcule le nombre de jours écoulés.</p>

          <label for="sinceDate">Date de départ</label>
          <input id="sinceDate" type="date" />

          <div class="row">
            <button id="saveDateBtn">Sauvegarder la date</button>
            <button id="calcDaysBtn" class="secondary">Calculer</button>
          </div>

          <p id="daysResult" class="result">—</p>

          <div class="row">
            <button id="backHomeFromDaysBtn" class="secondary">Retour accueil</button>
          </div>
        </section>

        <section id="techView" class="card hidden">
          <h2>Tuile Technique</h2>
          <p class="muted">OAuth Google + test de sauvegarde/lecture Drive.</p>

          <label for="clientId">Google OAuth Client ID</label>
          <input id="clientId" placeholder="xxxx.apps.googleusercontent.com" />
          <div class="row">
            <button id="saveConfig">Sauvegarder config locale</button>
          </div>

          <div class="row">
            <button id="loginBtn">Se connecter à Google</button>
            <button id="logoutBtn" class="secondary">Se déconnecter</button>
          </div>

          <label for="title">Titre / clé</label>
          <input id="title" placeholder="ex: note-1" />

          <label for="content">Contenu</label>
          <textarea id="content" placeholder="Texte à sauvegarder dans Drive"></textarea>

          <div class="row">
            <button id="saveBtn">Sauvegarder dans Drive</button>
            <button id="loadBtn" class="secondary">Charger depuis Drive</button>
          </div>

          <div class="row">
            <button id="backHomeFromTechBtn" class="secondary">Retour accueil</button>
          </div>

          <pre id="log" class="card" style="white-space: pre-wrap;"></pre>
        </section>
      </div>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
